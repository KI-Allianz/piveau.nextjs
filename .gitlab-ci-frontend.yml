stages:
  - build
  - deploy

build-image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    # 1. Create the Docker auth config (Standard Kaniko setup)
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json

    # -----------------------------------------------------------------------
    # 2. Generate the .env file
    # We create this in the root directory so the Dockerfile 'COPY' command picks it up.
    # -----------------------------------------------------------------------
    - echo "DOMAIN=$DOMAIN" >> .env
    - echo "SEARCH_HUB_URL=$SEARCH_HUB_URL" >> .env
    - echo "REPO_HUB_URL=$REPO_HUB_URL" >> .env

    # (Optional) Verify the file content in logs (Don't do this if variables are secrets!)
    - cat .env

    # 3. Build and Push the image
    - /kaniko/executor --context "${CI_PROJECT_DIR}" --dockerfile "${CI_PROJECT_DIR}/Dockerfile" --destination "${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}" --destination "${CI_REGISTRY_IMAGE}:latest"

  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy-to-vm:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)

    # 1. Create the SSH directory
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh

    # 2. Write the variable to the correct file (id_ed25519)
    # We still use 'tr -d \r' to clean up potential Windows formatting issues
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519

    # 3. Set permissions on the file
    - chmod 400 ~/.ssh/id_ed25519

    # 4. Add the key to the SSH agent
    - ssh-add ~/.ssh/id_ed25519

    # 5. Scan the VM's fingerprint
    - ssh-keyscan $VM_IP >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts

  script:
    - echo "Deploying to VM..."
    - ssh $VM_USER@$VM_IP "
      echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER --password-stdin $CI_REGISTRY &&
      docker pull $CI_REGISTRY_IMAGE:latest &&
      docker stop my-app-container || true &&
      docker rm my-app-container || true &&
      docker run -d --restart unless-stopped --name my-app-container --network host $CI_REGISTRY_IMAGE:latest &&
      docker image prune -f"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
